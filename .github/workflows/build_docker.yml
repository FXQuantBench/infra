name: Build and push strategy-runner image

on:
  push:
    branches:
      - main
    paths:
      - docker/Dockerfile.strategy

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.strategy
          push: true
          tags: ghcr.io/fxquantbench/strategy-runner:latest
